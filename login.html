<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Minotauro Sports</title>
    <link rel="stylesheet" href="home.css">
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <div class="login-header">
                <img src="imagens/Minotauro 3.PNG" alt="Minotauro" class="login-logo">
                <h2>Bem-vindo de volta!</h2>
                <p>Acesse sua conta para ver seus pedidos e cashback.</p>
            </div>

            <form id="formLogin" onsubmit="realizarLogin(event)">
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="E-mail" required>
                </div>
                
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senha" placeholder="Senha" required>
                    <i class="fas fa-eye toggle-pass" onclick="toggleSenha()"></i>
                </div>

                <div class="form-actions">
                    <label class="remember-me">
                        <input type="checkbox"> Lembrar de mim
                    </label>
                    <a href="#" class="forgot-pass">Esqueci a senha</a>
                </div>

                <button type="submit" class="btn-login-submit">
                    ENTRAR
                </button>
            </form>
            
            <div id="msgErro" class="error-msg"></div>

            <div class="login-footer">
                Não tem conta? <a href="#">Cadastre-se</a>
            </div>

            <div class="dev-helper">
                <small><strong>🔐 Credenciais de Teste:</strong></small>
                <ul>
                    <li>Nvl 1: <code>usuario@minotauro.com</code> | 123</li>
                    <li>Nvl 2: <code>atleta@minotauro.com</code> | 123</li>
                    <li>Nvl 3: <code>pro@minotauro.com</code> | 123</li>
                </ul>
            </div>
        </div>
    </div>

 <script>
        function toggleSenha() {
            const input = document.getElementById('senha');
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function realizarLogin(e) {
            e.preventDefault(); 
            
            const email = document.getElementById('email').value.toLowerCase().trim();
            const senha = document.getElementById('senha').value;
            const msgErro = document.getElementById('msgErro');

            // Mapeamento simples para o Login
            const usuariosValidos = {
                "usuario@minotauro.com": { id: 1, nome: "Lucas" },
                "atleta@minotauro.com":  { id: 2, nome: "Fernanda" },
                "pro@minotauro.com":     { id: 3, nome: "Roberto" }
            };

            const user = usuariosValidos[email];

            if (user && senha === "123") {
                // SUCESSO!
                // 1. Salva ID e NOME na memória do navegador
                localStorage.setItem("minotauro_user_id", user.id);
                localStorage.setItem("minotauro_user_name", user.nome);
                
                const btn = document.querySelector('.btn-login-submit');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Entrando...';
                btn.style.background = '#28a745';
                
                setTimeout(() => {
                    window.location.href = "perfil.html";
                }, 1000);

            } else {
                // ERRO
                msgErro.style.display = 'block';
                msgErro.innerHTML = '<i class="fas fa-exclamation-circle"></i> E-mail ou senha incorretos.';
                const card = document.querySelector('.login-card');
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
            }
        }
    </script>
</body>
</html>
